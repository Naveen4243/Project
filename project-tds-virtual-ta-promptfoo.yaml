providers:
  - openai:gpt-3.5

providerConfigs:
  local-virtual-ta:
    type: rest
    config:
      url: "http://127.0.0.1:8000/api/"
      method: POST
      headers:
        Content-Type: application/json
      body:
        question: "{{ question }}"
      response:
        path: "$"
        answer_path: ".answer"
        links_path: ".links"

scenarios:
  - name: "Basic questions"
    provider: local-virtual-ta
    tests:
      - input:
          question: "Tools in Data Science"
        output:
          answer: "I found 1 relevant resource(s) based on your question."
